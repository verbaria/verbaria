spring.main.banner-mode=off
spring.main.log-startup-info=false
spring.main.web-application-type=none
spring.main.register-shutdown-hook=false

# Quiet at root so Spring/Jetty don't spam the console at startup.
logging.level.root=WARN
logging.level.org.springframework=WARN

# Our own client code should log progress (pushing X, pulling Y, ...).
logging.level.org.zanata=INFO

# Minimal pattern: drop level prefix; just show our message text.
logging.pattern.console=%msg%n
