<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{_layout :: html(content=~{::main-content}, pageTitle='Sign in')}">
<body>
<main-content th:fragment="main-content" th:remove="tag">
    <h1>Sign in</h1>

    <div th:if="${error}" class="card" style="border-color:#c66; color:#c33"
         th:text="${error}">error</div>

    <form method="post" th:action="@{/account/login}" class="card" style="max-width:480px">
        <!-- Spring Security expects the CSRF token from CookieCsrfTokenRepository
             in a hidden field on every state-changing POST.  Thymeleaf's
             _csrf object is provided automatically by spring-security-web's
             CsrfRequestAttributeRequestPostProcessor. -->
        <input type="hidden" th:if="${_csrf != null}"
               th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <p>
            <label for="username">Username</label><br/>
            <input id="username" name="username" type="text" required style="width:100%; padding:0.5rem;"/>
        </p>
        <p>
            <label for="password">Password</label><br/>
            <input id="password" name="password" type="password" required style="width:100%; padding:0.5rem;"/>
        </p>
        <button type="submit" style="padding:0.5rem 1rem; background:#00729b; color:#fff; border:0; border-radius:4px;">
            Sign in
        </button>
        <p class="muted" style="margin-top:0.75rem; font-size:0.9rem">
            New here? <a th:href="@{/account/register}">Create an account</a>.
        </p>
    </form>

</main-content>
</body>
</html>
