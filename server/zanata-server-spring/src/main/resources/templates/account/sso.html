<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{_layout :: html(content=~{::main-content}, pageTitle='Single sign on')}">
<body>
<main-content th:fragment="main-content" th:remove="tag">
    <div class="g">
        <div class="g__item w--3-4-m w--1-2-l u-centerBlock">
            <div class="panel l--push-top-1">
                <div class="panel__header"><h2 class="gamma heading--sub">Single sign-on</h2></div>
                <div class="l--pad-all-half">
                    <p>Redirecting to your organisation's SSO provider…</p>
                    <a th:href="@{/account/login}" class="button">Use a username and password instead</a>
                </div>
            </div>
        </div>
    </div>
</main-content>
</body>
</html>
