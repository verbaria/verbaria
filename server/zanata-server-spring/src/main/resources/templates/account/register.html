<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{_layout :: html(content=~{::main-content}, pageTitle='Register')}">
<body>
<main-content th:fragment="main-content" th:remove="tag">
    <div class="g">
        <div class="g__item w--3-4-m w--1-2-l u-centerBlock">
            <div class="panel l--push-top-1">
                <div class="panel__header">
                    <h2 class="gamma heading--sub">Sign up</h2>
                </div>
                <div class="l--pad-all-half">
                    <div th:if="${message}" class="message message--info" th:text="${message}">message</div>
                    <form th:action="@{/account/register}" method="post" class="form">
                        <div class="form__item">
                            <label for="name">Full name</label>
                            <input type="text" id="name" name="name" required="required"/>
                        </div>
                        <div class="form__item">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" required="required"/>
                        </div>
                        <div class="form__item">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required="required"/>
                        </div>
                        <div class="form__item">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required="required"/>
                        </div>
                        <!-- honeypot field -->
                        <input type="text" id="human" name="human" class="is-hidden" tabindex="-1" autocomplete="off"/>
                        <p class="txt--mini l--push-top-half">
                            By signing up you agree to the
                            <a th:href="@{/about/terms}">Terms of Service</a>.
                        </p>
                        <button type="submit" class="button--primary l--push-top-half">Sign up</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main-content>
</body>
</html>
