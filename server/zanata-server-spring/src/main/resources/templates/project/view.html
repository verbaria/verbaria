<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{_layout :: html(content=~{::main-content}, pageTitle=|Projects - ${project.name}|)}">
<!--
  Direct Thymeleaf port of server/zanata-war/src/main/webapp/project/project.xhtml.
  Markup, CSS classes and div structure are kept 1:1 so /resources/assets/css/style.css
  renders it identically to the legacy view; JSF EL is substituted with
  Thymeleaf EL and `rendered` conditions become `th:if`.

  RichFaces tab activation JS / AJAX-rendered statistics are stripped —
  the static tab strip + first-tab content keep the visual layout but
  navigation between tabs becomes a plain link (the React side already
  serves the equivalent dashboard at /project/{slug}/version/{v}).
-->
<body>
<main-content th:fragment="main-content" th:remove="tag">

<div id="projectsWrapper"></div>

<div class="g u-fullWidth">

  <div class="g__item w--1-m w--3-8-l w--1-3 l--push-bottom-half">
    <p class="txt--meta l--push-all-0">
      <a th:href="@{/dashboard/projects}">Projects</a>
    </p>

    <div class="media l--push-bottom-half" id="project-info">
      <div class="media__body">
        <h1 class="l--push-all-0" th:text="${project.name}">Project Name</h1>
        <p class="txt--understated"
           th:if="${project.description != null and !#strings.isEmpty(project.description)}"
           th:text="${project.description}">Description</p>
      </div>

      <div class="d--top l--push-top-half l--pad-top-half"
           th:if="${(project.sourceViewURL != null and !#strings.isEmpty(project.sourceViewURL))
                    or (project.sourceCheckoutURL != null and !#strings.isEmpty(project.sourceCheckoutURL))}">
        <h2 class="delta headding--secondary l--push-top-0">
          <i class="i--left i--source"></i> Source Code
        </h2>
        <ul class="list--no-bullets txt--meta l--push-top-quarter">
          <li th:if="${project.sourceViewURL != null and !#strings.isEmpty(project.sourceViewURL)}">
            <span class="list__title">Home Page: </span>
            <a th:href="${project.sourceViewURL}" target="_blank" th:text="${project.sourceViewURL}">
              <i class="i--small i--right i--external-link txt--neutral"></i>
            </a>
          </li>
          <li th:if="${project.sourceCheckoutURL != null and !#strings.isEmpty(project.sourceCheckoutURL)}">
            <div class="bx--table">
              <div class="bx--table__cell txt--nowrap">
                <span class="list__title">Repository: </span>
              </div>
              <div class="bx--table__cell w--1 w--1-s l--pad-left-quarter h--1">
                <input type="text"
                       class="list__item__info form__input--copyable js-form__input--copyable"
                       readonly="readonly"
                       th:value="${project.sourceCheckoutURL}"/>
              </div>
            </div>
          </li>
        </ul>
      </div>
    </div>

  </div>

  <div class="g__item w--1-m w--5-8-l w--2-3">
    <div class="tabs--lined js-tabs">
      <ul class="tabs__nav js-tabs-nav">
        <li>
          <a id="versions_tab" th:href="@{|/project/view/${slug}/versions|}" class="js-url-mod" data-content="#versions">
            <i class="i i--version"></i>
            <span class="is-hidden--s i__text--right">
              Versions
              <span class="txt--neutral" id="versions-size"
                    th:text="${project.projectIterations != null ? #lists.size(project.projectIterations) : 0}">0</span>
            </span>
          </a>
        </li>
        <li>
          <a id="people_tab" th:href="@{|/project/view/${slug}/people|}" class="js-url-mod" data-content="#people">
            <i class="i i--users"></i>
            <span class="is-hidden--s i__text--right">
              People
              <span class="txt--neutral" id="people-size"
                    th:text="${project.members != null ? #lists.size(project.members) : 0}">0</span>
            </span>
          </a>
        </li>
        <li>
          <div class="link zeta">
            <a id="glossary_tab" th:href="@{|/glossary/project/${slug}|}">
              <i class="i i--glossary"></i>
              <span class="is-hidden--s i__text--right">
                Glossary
                <span class="txt--neutral" id="glossary-size">0</span>
              </span>
            </a>
          </div>
        </li>
        <li>
          <a id="about_tab" th:href="@{|/project/view/${slug}/about|}" class="js-url-mod" data-content="#about">
            <i class="i i--info"></i>
            <span class="is-hidden--s i__text--right">About</span>
          </a>
        </li>
      </ul>

      <ul class="tabsContent panels__container js-tabs-content l--push-top-1">
        <li id="versions">
          <div th:if="${project.projectIterations == null or project.projectIterations.isEmpty()}"
               class="txt--understated">
            No versions yet.
          </div>
          <ul class="list--no-bullets" th:unless="${project.projectIterations == null}">
            <li th:each="iter : ${project.projectIterations}" class="l--push-bottom-half">
              <a th:href="@{|/project/translate/${slug}/v/${iter.slug}/document/messages?lang=fr|}"
                 th:text="${iter.slug}">version-slug</a>
            </li>
          </ul>
        </li>

        <li id="people">
          <div class="txt--understated">No members yet.</div>
        </li>

        <li id="about">
          <div id="project-about">
            <div id="home-content-rendered" class="prose"
                 th:if="${project.homeContent != null and !#strings.isEmpty(project.homeContent)}"
                 th:utext="${project.homeContent}">home content</div>
            <span th:if="${project.homeContent == null or #strings.isEmpty(project.homeContent)}">
              No home content has been set for this project.
            </span>
          </div>
        </li>
      </ul>
    </div>
  </div>

</div>

</main-content>
</body>
</html>
