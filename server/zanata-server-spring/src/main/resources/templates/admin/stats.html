<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{_layout :: html(content=~{::main-content}, pageTitle='Overall statistics')}">
<body>
<main-content th:fragment="main-content" th:remove="tag">
    <div th:replace="~{admin/_card :: card('Overall statistics', ~{::cardBody})}">
        <div th:fragment="cardBody" th:remove="tag">
            <p>Cluster-wide statistics: total projects, versions, translated
                strings, contributors.  Will populate from /rest/stats once
                that endpoint migrates.</p>
            <ul class="list--no-bullets">
                <li>Projects: <strong>—</strong></li>
                <li>Versions: <strong>—</strong></li>
                <li>Translated strings: <strong>—</strong></li>
                <li>Contributors: <strong>—</strong></li>
            </ul>
        </div>
    </div>
</main-content>
</body>
</html>
