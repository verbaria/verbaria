<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{_layout :: html(content=~{::main-content}, pageTitle=|User · ${username ?: '?'}|)}">
<body>
<main-content th:fragment="main-content" th:remove="tag">
    <div th:replace="~{admin/_card :: card('User detail', ~{::cardBody})}">
        <div th:fragment="cardBody" th:remove="tag">
            <p th:if="${username}">Editing: <strong th:text="${username}">username</strong></p>
            <p th:unless="${username}">No username supplied.</p>
            <a th:href="@{/admin/usermanager}" class="button">Back to user manager</a>
        </div>
    </div>
</main-content>
</body>
</html>
