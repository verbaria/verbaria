<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Shared fragment for /admin/* landing panels. Each page composes this
  with a title + body via th:replace + th:include so the section
  heading, "Administration" breadcrumb and card chrome stay consistent.
-->
<body>

<div th:fragment="card(title, body)" class="g">
    <div class="g__item w--1 u-centerBlock">
        <p class="txt--meta">
            <a th:href="@{/admin/home}">Administration</a>
        </p>
        <div class="panel l--push-top-1">
            <div class="panel__header">
                <h2 class="gamma heading--sub" th:text="${title}">title</h2>
            </div>
            <div class="l--pad-all-half">
                <div th:replace="${body}">page body</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
