<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{_layout :: html(content=~{::main-content}, pageTitle=|Role · ${role ?: '?'}|)}">
<body>
<main-content th:fragment="main-content" th:remove="tag">
    <div th:replace="~{admin/_card :: card('Role detail', ~{::cardBody})}">
        <div th:fragment="cardBody" th:remove="tag">
            <p th:if="${role}">Editing role: <strong th:text="${role}">role</strong></p>
            <a th:href="@{/admin/rolemanager}" class="button">Back to roles</a>
        </div>
    </div>
</main-content>
</body>
</html>
