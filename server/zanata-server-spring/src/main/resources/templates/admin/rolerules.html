<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{_layout :: html(content=~{::main-content}, pageTitle='Role assignment rules')}">
<body>
<main-content th:fragment="main-content" th:remove="tag">
    <div th:replace="~{admin/_card :: card('Role assignment rules', ~{::cardBody})}">
        <div th:fragment="cardBody" th:remove="tag">
            <p>Automatic role assignment rules (regex / OpenID pattern → role).</p>
            <a th:href="@{/admin/roleruledetails}" class="button--primary">Add rule</a>
        </div>
    </div>
</main-content>
</body>
</html>
