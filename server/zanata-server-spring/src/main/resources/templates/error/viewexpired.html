<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{_layout :: html(content=~{::main-content}, pageTitle='Session expired')}">
<body>
<main-content th:fragment="main-content" th:remove="tag">
    <div class="g">
        <div class="g__item w--3-4-m w--1-2-l u-centerBlock txt--align-center l--push-top-2">
            <h1 class="alpha">Session expired</h1>
            <p class="lead">Your session has expired.  Please sign in again to continue.</p>
            <p><a th:href="@{/account/login}" class="button--primary">Sign in</a></p>
        </div>
    </div>
</main-content>
</body>
</html>
