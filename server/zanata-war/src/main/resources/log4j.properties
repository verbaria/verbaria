# Runtime log4j 1.2 configuration.
#
# Inside WildFly the actual logging is handled by jboss-logmanager (see
# subsystem=logging in standalone-full.xml), not log4j.  This file exists
# only so the few transitive deps that still call into log4j 1.x directly
# (Hibernate Validator 4.x utilities, some Apache Commons, etc.) find a
# configured root logger instead of printing the "No appenders could be
# found for logger" bootstrap warning on every JVM start.
#
# Severity is matched to the jboss-logmanager root level (INFO) so
# anything that escapes the bridge still lands on stdout in the same
# format as WildFly's own output.

log4j.rootLogger=INFO, console

log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.out
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{HH:mm:ss,SSS} %-5p [%c] (%t) %m%n

# Mute the noisiest legacy categories — they get re-emitted by WildFly's
# jboss-logmanager-bridged loggers at the same level anyway.
log4j.logger.org.hibernate.tool.hbm2ddl.SchemaExport=OFF
log4j.logger.org.hibernate.SQL=WARN
