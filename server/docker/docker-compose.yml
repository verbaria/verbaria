# Local dev compose: Postgres + Spring Boot Zanata server.
#
#   docker compose -f server/docker/docker-compose.yml up --build
#
# UI:  http://localhost:8080/
# DB:  postgres://postgres:1234@localhost:5432/zanata

services:
  zanatadb:
    image: postgres:16
    environment:
      POSTGRES_DB: zanata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    volumes:
      - zanata-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zanata"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  zanata:
    depends_on:
      zanatadb:
        condition: service_healthy
    build:
      context: ../..
      dockerfile: server/docker/Dockerfile
    image: zanata-server
    environment:
      ZANATA_DB_URL: jdbc:postgresql://zanatadb:5432/zanata?options=-c%20TimeZone%3DUTC
      ZANATA_DB_USER: postgres
      ZANATA_DB_PASSWORD: "1234"
      JAVA_OPTS: "-XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/opt/zanata"
    ports:
      - "8080:8080"
    volumes:
      - zanata-data:/opt/zanata

volumes:
  zanata-pgdata:
  zanata-data:
