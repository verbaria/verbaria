name: Build

# Runs `mvn package` on every push and pull request. Tests run as part of
# the normal Maven lifecycle — Surefire is configured to fail the build on
# any test failure, so a green workflow run means the test suite passed.

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

# Cancel in-progress runs for the same ref when a new commit arrives.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Package (JDK 25)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Build the whole reactor, run tests, and produce the CLI distribution
      # archives. `-B` is non-interactive (no progress bars in CI logs).
      # Maven Surefire fails the build on any test failure by default — no
      # extra flag needed for "fail if tests failed".
      # -Pproduction builds the Vaadin production bundle (prepare-frontend +
      # build-frontend) and excludes vaadin-dev, so the packaged server jar
      # runs in production mode instead of demanding vaadin-dev-server.
      - name: Build + test + package
        run: ./mvnw -B -ntp -Pproduction package

      # Surface the test reports even when the job fails, so the failure is
      # diagnosable from the workflow run page.
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/**'
          if-no-files-found: ignore
          retention-days: 7

      # Read the Maven project version so artifact names follow the poms.
      - name: Resolve project version
        if: success()
        id: ver
        run: |
          VERSION="$(./mvnw -B -ntp -q help:evaluate \
            -Dexpression=project.version -DforceStdout)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Rebrand the build outputs to the published asset names (same as the
      # release workflow) without touching the Maven build itself.
      - name: Collect artifacts
        if: success()
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p build-artifacts
          cp "client/zanata-cli/target/verbaria-${VERSION}-dist.tar.gz" \
            "build-artifacts/verbaria-cli-${VERSION}.tar.gz"
          cp "client/zanata-cli/target/verbaria-${VERSION}-dist.zip" \
            "build-artifacts/verbaria-cli-${VERSION}.zip"
          cp "server/zanata-server-spring/target/zanata-server-spring-${VERSION}.jar" \
            "build-artifacts/verbaria-server-${VERSION}.jar"
          ls -lh build-artifacts

      # Publish the Verbaria CLI archives and server jar so PR reviewers and
      # release managers can grab them from the run summary.
      - name: Upload Verbaria artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: verbaria-artifacts
          path: build-artifacts/*
          if-no-files-found: warn
          retention-days: 30
