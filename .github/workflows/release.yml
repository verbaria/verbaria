name: Release

# Publishes a GitHub Release with the CLI distribution archives and the server
# jar whenever a pushed commit message ends with "[release]". Can also be run
# manually from the Actions tab (workflow_dispatch).
#
# The release tag/name use the Maven project version (read at build time), so
# bumping the version in the poms is all that's needed to cut a new version.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Need write access to create the tag, release, and upload assets.
permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build + publish release
    runs-on: ubuntu-latest
    # Gate: manual runs always proceed; pushes only when the head commit
    # message ends with the [release] marker.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      endsWith(github.event.head_commit.message, '[release]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Build the whole reactor (tests included) and produce the CLI
      # distribution archives and the repackaged Spring Boot server jar.
      - name: Build + test + package
        run: ./mvnw -B -ntp package

      # Read the Maven project version so the release tag, name, and asset
      # paths follow the poms (e.g. 5.0.0) rather than being hard-coded.
      - name: Resolve project version
        id: ver
        run: |
          VERSION="$(./mvnw -B -ntp -q help:evaluate \
            -Dexpression=project.version -DforceStdout)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      # Rebrand the release assets at upload time only (the Maven build outputs
      # and Docker image are left untouched). Fails loudly if a source file is
      # missing.
      - name: Collect release artifacts
        id: artifacts
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p release-artifacts
          cp "client/zanata-cli/target/verbaria-${VERSION}-dist.tar.gz" \
            "release-artifacts/verbaria-cli-${VERSION}.tar.gz"
          cp "client/zanata-cli/target/verbaria-${VERSION}-dist.zip" \
            "release-artifacts/verbaria-cli-${VERSION}.zip"
          cp "server/zanata-server-spring/target/zanata-server-spring-${VERSION}.jar" \
            "release-artifacts/verbaria-server-${VERSION}.jar"
          ls -lh release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Verbaria ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/verbaria-cli-${{ steps.ver.outputs.version }}.tar.gz
            release-artifacts/verbaria-cli-${{ steps.ver.outputs.version }}.zip
            release-artifacts/verbaria-server-${{ steps.ver.outputs.version }}.jar
